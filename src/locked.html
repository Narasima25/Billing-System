<!DOCTYPE html>
<html>

<head>
    <title>Application Locked</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f8f9fa;
        }

        .box {
            background: white;
            padding: 40px;
            display: inline-block;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #dc3545;
        }

        .id-container {
            background: #e9ecef;
            padding: 10px;
            font-family: monospace;
            font-size: 16px;
            border: 1px solid #ced4da;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>License Activation Required</h1>
        <p>This software is locked to this specific computer. Please provide the ID below to activate your system.</p>
        <div class="id-container" id="machine-id">Loading Machine ID...</div>
        <p style="color: #6c757d; font-size: 12px;">Contact support to unlock your billing application.</p>
    </div>
</body>

</html>
