<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Store POS — Billing & Inventory Management</title>
  <meta name="description" content="Professional Pet Store Point of Sale and Inventory Management System">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════
     LOGIN SCREEN
     ═══════════════════════════════════════════════════════════════════════ -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <div class="login-logo"><img src="logo.png" alt="Logo" style="height: 100px; width: auto; object-fit: contain;"></div>
    <div class="login-title">Pet Store POS</div>
    <div class="login-subtitle">Sign in to manage your store</div>
    <div class="login-field">
      <label for="login-username">Username</label>
      <input type="text" id="login-username" placeholder="Enter username" autocomplete="off" autofocus>
    </div>
    <div class="login-field">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Enter password">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-btn">Sign In</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════════════════════ -->
<div id="app-shell">

  <!-- ─── Sidebar ─────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="logo-icon"><img src="logo.png" alt="Logo" style="height: 40px; width: auto; object-fit: contain;"></span>
      <div>
        <div class="brand-text">PetStore POS</div>
        <div class="brand-sub">Management</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <button class="nav-item active" data-module="dashboard" id="nav-dashboard">
        <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span> Dashboard
      </button>
      <button class="nav-item" data-module="billing" id="nav-billing">
        <span class="nav-icon"><i data-lucide="shopping-cart"></i></span> Billing POS
      </button>

      <div class="sidebar-section-label">Manage</div>
      <button class="nav-item" data-module="products" id="nav-products">
        <span class="nav-icon"><i data-lucide="tags"></i></span> Products
      </button>
      <button class="nav-item" data-module="inventory" id="nav-inventory">
        <span class="nav-icon"><i data-lucide="package"></i></span> Inventory
      </button>
      <button class="nav-item" data-module="suppliers" id="nav-suppliers">
        <span class="nav-icon"><i data-lucide="building-2"></i></span> Suppliers
      </button>

      <div class="sidebar-section-label">Insights</div>
      <button class="nav-item" data-module="reports" id="nav-reports">
        <span class="nav-icon"><i data-lucide="clipboard-list"></i></span> Reports
      </button>

      <div class="sidebar-section-label" id="admin-section-label">Admin</div>
      <button class="nav-item" data-module="settings" id="nav-settings">
        <span class="nav-icon"><i data-lucide="settings"></i></span> Settings
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">A</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-username">Administrator</div>
          <div class="user-role" id="sidebar-role">admin</div>
        </div>
      </div>
      <button class="sidebar-logout" id="btn-logout"><i data-lucide="log-out"></i> Sign Out</button>
    </div>
  </aside>

  <!-- ─── Header Bar ──────────────────────────────────────────────────── -->
  <header class="header-bar">
    <div class="header-title">
      <span class="header-icon" id="header-icon"><i data-lucide="layout-dashboard"></i></span>
      <span id="header-text">Dashboard</span>
    </div>
    <div class="header-right">
      <span class="header-time" id="header-time"></span>
    </div>
  </header>

  <!-- ─── Content Area ────────────────────────────────────────────────── -->
  <main class="content-area" id="content-area">

    <!-- ═══ Dashboard Module ═══ -->
    <div class="module-panel active" id="panel-dashboard"></div>

    <!-- ═══ Billing POS Module ═══ -->
    <div class="module-panel" id="panel-billing"></div>

    <!-- ═══ Products Module ═══ -->
    <div class="module-panel" id="panel-products"></div>

    <!-- ═══ Inventory Module ═══ -->
    <div class="module-panel" id="panel-inventory"></div>

    <!-- ═══ Suppliers Module ═══ -->
    <div class="module-panel" id="panel-suppliers"></div>

    <!-- ═══ Reports Module ═══ -->
    <div class="module-panel" id="panel-reports"></div>

    <!-- ═══ Settings Module ═══ -->
    <div class="module-panel" id="panel-settings"></div>

  </main>
</div>

<!-- ═══ Toast Container ═══ -->
<div class="toast-container" id="toast-container"></div>

<!-- ═══ Receipt Container (hidden, for printing) ═══ -->
<div class="receipt-container" id="receipt-container"></div>

<!-- ═══════════════════════════════════════════════════════════════════════
     MODALS
     ═══════════════════════════════════════════════════════════════════════ -->

<!-- Add/Edit Product Modal -->
<div class="modal-overlay" id="modal-product">
  <div class="modal-box lg">
    <div class="modal-header">
      <div class="modal-title" id="modal-product-title"><i data-lucide="tag"></i> Add Product</div>
      <button class="modal-close" onclick="closeModal('modal-product')">✕</button>
    </div>
    <form id="form-product" onsubmit="return false;">
      <input type="hidden" id="product-edit-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Barcode *</label>
          <input type="text" class="form-input" id="prod-barcode" placeholder="Scan or type barcode" required>
        </div>
        <div class="form-group">
          <label class="form-label">Product Name *</label>
          <input type="text" class="form-input" id="prod-name" placeholder="e.g. Pedigree Dry Food 1kg" required>
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="prod-category"><option value="">— Select —</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">Brand</label>
          <input type="text" class="form-input" id="prod-brand" placeholder="e.g. Pedigree">
        </div>
        <div class="form-group">
          <label class="form-label">Supplier</label>
          <select class="form-select" id="prod-supplier"><option value="">— Select —</option></select>
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label">Purchase Price (₹)</label>
          <input type="number" class="form-input" id="prod-purchase-price" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Selling Price (₹) *</label>
          <input type="number" class="form-input" id="prod-selling-price" placeholder="0.00" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label class="form-label">GST %</label>
          <input type="number" class="form-input" id="prod-gst" placeholder="0" step="0.01" min="0" max="100">
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label">HSN Code</label>
          <input type="text" class="form-input" id="prod-hsn" placeholder="e.g. 2309">
        </div>
        <div class="form-group">
          <label class="form-label">Opening Stock</label>
          <input type="number" class="form-input" id="prod-stock" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Min. Stock Level</label>
          <input type="number" class="form-input" id="prod-min-stock" placeholder="5" min="0" value="5">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Batch Number (Optional)</label>
          <input type="text" class="form-input" id="prod-batch" placeholder="e.g. BATCH-001">
        </div>
        <div class="form-group">
          <label class="form-label">Expiry Date (Optional)</label>
          <input type="date" class="form-input" id="prod-expiry">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="prod-desc" placeholder="Product description (optional)"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-product')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="btn-save-product">Save Product</button>
      </div>
    </form>
  </div>
</div>

<!-- Add/Edit Category Modal -->

<!-- ═══════════════════════════════════════════════════════════════════════
     SCRIPTS
     ═══════════════════════════════════════════════════════════════════════ -->
<script src="../node_modules/lucide/dist/umd/lucide.js"></script>
<script src="UI/dashboard.js"></script>
<script src="UI/billing.js"></script>
<script src="UI/products.js"></script>
<script src="UI/inventory.js"></script>
<script src="UI/suppliers.js"></script>
<script src="UI/reports.js"></script>
<script src="UI/settings.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  GLOBAL APP LOGIC
// ═══════════════════════════════════════════════════════════════════════════

// ─── Session State ──────────────────────────────────────────────────────
let currentUser = null;

// ─── Global Helpers ─────────────────────────────────────────────────────
window.formatRupees = function(paise) {
  return '₹' + (paise / 100).toFixed(2);
};
window.parseRupeesToPaise = function(rupeeStr) {
  return Math.round(parseFloat(rupeeStr || 0) * 100);
};
window.formatDate = function(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const day = d.getDate().toString().padStart(2,'0');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mon = months[d.getMonth()];
  const year = d.getFullYear();
  let h = d.getHours(); const m = d.getMinutes().toString().padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  return `${day} ${mon} ${year}, ${h}:${m} ${ampm}`;
};
window.formatDateShort = function(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
};
window.getToday = function() {
  return new Date().toISOString().split('T')[0];
};

// ─── Toast Notifications ────────────────────────────────────────────────
window.showToast = function(message, type = 'info') {
  const icons = { success: '<i data-lucide="check-circle"></i>', error: '<i data-lucide="x-circle"></i>', info: '<i data-lucide="info"></i>', warning: '<i data-lucide="alert-triangle"></i>' };
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = '<span class="toast-icon">' + (icons[type] || '<i data-lucide="info"></i>') + '</span> ' + message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3100);
};

// ─── Modal Helpers ──────────────────────────────────────────────────────
window.openModal = function(id) {
  document.getElementById(id).classList.add('visible');
};
window.closeModal = function(id) {
  document.getElementById(id).classList.remove('visible');
};
// Close on backdrop click
document.querySelectorAll('.modal-overlay').forEach(modal => {
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.classList.remove('visible');
  });
});
// Close on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.visible').forEach(m => m.classList.remove('visible'));
  }
});

// ─── Login ──────────────────────────────────────────────────────────────
const loginOverlay = document.getElementById('login-overlay');
const loginBtn = document.getElementById('login-btn');
const loginError = document.getElementById('login-error');
const loginUsername = document.getElementById('login-username');
const loginPassword = document.getElementById('login-password');

loginBtn.addEventListener('click', handleLogin);
loginPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
loginUsername.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginPassword.focus(); });

async function handleLogin() {
  const username = loginUsername.value.trim();
  const password = loginPassword.value.trim();
  if (!username || !password) { loginError.textContent = 'Please enter both fields'; return; }
  loginError.textContent = '';
  loginBtn.disabled = true;
  loginBtn.textContent = 'Signing in...';

  try {
    const result = await window.api.auth.login({ username, password });
    if (result.success) {
      currentUser = result.user;
      loginOverlay.classList.add('hidden');
      initApp();
    } else {
      loginError.textContent = result.error || 'Login failed';
    }
  } catch(err) {
    loginError.textContent = 'Connection error';
  }
  loginBtn.disabled = false;
  loginBtn.textContent = 'Sign In';
}

// ─── Logout ─────────────────────────────────────────────────────────────
document.getElementById('btn-logout').addEventListener('click', () => {
  currentUser = null;
  loginOverlay.classList.remove('hidden');
  loginUsername.value = '';
  loginPassword.value = '';
  loginError.textContent = '';
  loginUsername.focus();
});

// ─── Initialize App After Login ─────────────────────────────────────────
function initApp() {
  // Update sidebar user info
  document.getElementById('sidebar-avatar').textContent = currentUser.display_name.charAt(0).toUpperCase();
  document.getElementById('sidebar-username').textContent = currentUser.display_name;
  document.getElementById('sidebar-role').textContent = currentUser.role;

  // Role-based nav visibility
  const role = currentUser.role;
  const allNavItems = document.querySelectorAll('.nav-item[data-module]');
  allNavItems.forEach(item => {
    const mod = item.dataset.module;
    if (role === 'cashier') {
      // Cashier: only billing
      item.style.display = (mod === 'billing') ? '' : 'none';
    } else if (role === 'manager') {
      // Manager: billing, inventory, products, reports, dashboard
      item.style.display = (mod === 'settings') ? 'none' : '';
    } else {
      // Admin: all
      item.style.display = '';
    }
  });

  // Hide admin section labels for non-admins
  document.getElementById('admin-section-label').style.display = role === 'admin' ? '' : 'none';

  // Navigate to default module
  if (role === 'cashier') {
    navigateTo('billing');
  } else {
    navigateTo('dashboard');
  }

  // Start header clock
  updateClock();
  setInterval(updateClock, 30000);
}

// ─── Navigation ─────────────────────────────────────────────────────────
const moduleIcons = {
  dashboard: '<i data-lucide="layout-dashboard"></i>', billing: '<i data-lucide="shopping-cart"></i>', products: '<i data-lucide="tags"></i>', inventory: '<i data-lucide="package"></i>',
  suppliers: '<i data-lucide="building-2"></i>', reports: '<i data-lucide="clipboard-list"></i>', settings: '<i data-lucide="settings"></i>'
};
const moduleNames = {
  dashboard: 'Dashboard', billing: 'Billing POS', products: 'Products',
  inventory: 'Inventory', suppliers: 'Suppliers', reports: 'Reports', settings: 'Settings'
};

document.querySelectorAll('.nav-item[data-module]').forEach(item => {
  item.addEventListener('click', () => navigateTo(item.dataset.module));
});

function navigateTo(module) {
  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navBtn = document.querySelector(`.nav-item[data-module="${module}"]`);
  if (navBtn) navBtn.classList.add('active');

  // Update header
  document.getElementById('header-icon').innerHTML = moduleIcons[module] || '';
  document.getElementById('header-text').textContent = moduleNames[module] || module;

  // Show panel
  document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-' + module);
  if (panel) panel.classList.add('active');

  // Trigger module init/refresh
  switch(module) {
    case 'dashboard':  if(typeof DashboardModule !== 'undefined') DashboardModule.init(); break;
    case 'billing':    if(typeof BillingModule !== 'undefined') BillingModule.init(); break;
    case 'products':   if(typeof ProductsModule !== 'undefined') ProductsModule.init(); break;
    case 'inventory':  if(typeof InventoryModule !== 'undefined') InventoryModule.init(); break;
    case 'suppliers':  if(typeof SuppliersModule !== 'undefined') SuppliersModule.init(); break;
    case 'reports':    if(typeof ReportsModule !== 'undefined') ReportsModule.init(); break;
    case 'settings':   if(typeof SettingsModule !== 'undefined') SettingsModule.init(); break;
  }

  // Render SVG icons
  setTimeout(() => lucide.createIcons(), 10);
}

// ─── Header Clock ───────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const opts = { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true };
  document.getElementById('header-time').textContent = now.toLocaleDateString('en-IN', opts);
}
</script>
